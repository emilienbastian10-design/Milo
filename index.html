<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

const firebaseConfig = {
apiKey: “AIzaSyDBj-lEcAx4QbD0g_7oQTu1Cpp_2H0Le20”,
authDomain: “milo-2ab09.firebaseapp.com”,
databaseURL: “https://milo-2ab09-default-rtdb.europe-west1.firebasedatabase.app”,
storageBucket: “milo-2ab09.firebasestorage.app”,
messagingSenderId: “577785359632”,
appId: “1:577785359632:web:25a3d304a311282731c995”,
measurementId: “G-RY9H94J855”,
projectId: “milo-2ab09”,
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.fbRef = (path) => ref(db, path);
window.fbSet = (path, data) => set(ref(db, path), data);
window.fbGet = async (path) => {
const snap = await get(ref(db, path));
return snap.exists() ? snap.val() : null;
};
window.fbListen = (path, cb) => onValue(ref(db, path), snap => cb(snap.exists() ? snap.val() : null));
window.firebaseReady = true;
window.dispatchEvent(new Event(“firebaseReady”));
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:#EEF6FF;min-height:100vh;padding:20px 16px 100px;background-image:radial-gradient(circle at 10% 20%,rgba(100,180,255,0.1) 0%,transparent 50%),radial-gradient(circle at 90% 80%,rgba(60,140,255,0.07) 0%,transparent 50%)}
input,textarea,button{font-family:'Nunito',sans-serif}
.dog-name-wrap{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px;margin-top:8px}
#dogNameInput{font-family:'Baloo 2',cursive;font-size:1.8rem;font-weight:800;color:#2563EB;background:transparent;border:none;border-bottom:3px solid #60A5FA;outline:none;text-align:center;width:200px;padding:2px 4px}
#dogNameInput::placeholder{color:#93C5FD}

.tabs{display:flex;background:white;border-radius:14px;padding:4px;gap:4px;margin-bottom:24px;box-shadow:0 2px 10px rgba(61,35,20,0.1)}
.tab{flex:1;padding:10px 0;border-radius:10px;border:none;cursor:pointer;font-family:'Baloo 2',cursive;font-weight:700;font-size:.95rem;background:transparent;color:#8B5E3C;transition:all .2s}
.tab.active{background:#2563EB;color:white}
.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.btn-action{display:flex;flex-direction:column;align-items:center;gap:8px;padding:18px 10px;border:none;border-radius:20px;cursor:pointer;font-family:'Baloo 2',cursive;font-weight:600;font-size:.95rem;color:white;box-shadow:0 4px 16px rgba(61,35,20,0.12);transition:transform .15s}
.btn-action:active{transform:scale(.93)}

.qty-input{font-family:'Baloo 2',cursive;font-size:2rem;font-weight:800;color:#3D2314;width:110px;text-align:center;border:2px solid #e0cbb0;border-radius:14px;padding:8px 4px;outline:none;background:white}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#3D2314;color:white;padding:10px 22px;border-radius:20px;font-size:.9rem;font-weight:600;transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:300;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>

<body>

<div class="time-modal-overlay" id="timeModal" onclick="if(event.target===this)closeTimeModal()">
  <div class="time-modal-box">

    <div style="display:flex;justify-content:center;margin-bottom:24px">
      <input type="time" id="timeInput" class="time-input">

      <button class="btn-confirm-blue" onclick="confirmTime()">✓ OK</button>

<div id="toast"></div>

<script>
const TYPES = {
  pipi:   {label:"Pipi",  icon:"💧", bg:"#FFF5D6", color:"#E8A820"},
  caca:   {label:"Caca",  icon:"💩", bg:"#F5EBE0", color:"#7B4F2E"},
  manger: {label:"Repas", icon:"🍖", bg:"#FDEEE9", color:"#E8735A"},
};

let entries = JSON.parse(localStorage.getItem("entries")||"[]");
let notes = [];
let dogName = localStorage.getItem("dogName") || "Milo";
let viewOffset = 0;
let currentTab = "journal";
let foodUnit = "g", foodUnitJeu = "g";
let editingId = null, timeEditId = null;

document.getElementById("dogNameInput").value = dogName;
document.getElementById("dogNameInput").addEventListener("input", e => {
  dogName = e.target.value;
  localStorage.setItem("dogName", dogName);
  if(window.firebaseReady) window.fbSet("data/dogName", dogName);
});

function getViewDate() {
  const d = new Date(); d.setDate(d.getDate()+viewOffset); d.setHours(0,0,0,0); return d;
}
function isToday(d)     { return d.toDateString()===new Date().toDateString(); }
function isYesterday(d) { const y=new Date(); y.setDate(y.getDate()-1); return d.toDateString()===y.toDateString(); }
function dayLabel(d) {
  if(isToday(d)) return "Aujourd'hui";
  if(isYesterday(d)) return "Hier";
  return d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
}
function daySub(d) {
  return isToday(d) ? d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"}) : "";
}
function fmtTime(ts) { return new Date(ts).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}); }
function timeAgo(ts) {
  const m=Math.floor((Date.now()-ts)/60000);
  if(m<1) return "À l'instant";
  if(m<60) return `il y a ${m} min`;
  const h=Math.floor(m/60);
  if(h<24) return `il y a ${h}h${m%60>0?(m%60)+"min":""}`;
  return `il y a ${Math.floor(h/24)}j`;
}
function toTimeVal(ts) {
  const d=new Date(ts);
  return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}
function applyTime(ts,str) {
  const [h,m]=str.split(":").map(Number);
  const d=new Date(ts); d.setHours(h,m,0,0); return d.getTime();
}
function noteKey(d) { return "notes_"+d.toISOString().slice(0,10); }

function setSyncStatus(msg) { document.getElementById("syncStatus").textContent = msg; }

// Init Firebase listener
window.addEventListener("firebaseReady", () => {
  // Listen to entries
  window.fbListen("data", val => {
    if (!val) return;
    if (val.entries) {
      entries = val.entries;
      localStorage.setItem("entries", JSON.stringify(entries));
    }
    if (val.dogName) {
      dogName = val.dogName;
      localStorage.setItem("dogName", dogName);
      document.getElementById("dogNameInput").value = dogName;
    }
    setSyncStatus("✓ Synchro "+new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}));
    render();
  });

  // Listen to current day notes
  listenNotes(getViewDate());
  setSyncStatus("✓ Connecté");
});

function listenNotes(d) {
  if (!window.firebaseReady) return;
  window.fbListen(noteKey(d), val => {
    notes = val && Array.isArray(val) ? val : [];
    renderNotes();
  });
}

async function saveEntries() {
  localStorage.setItem("entries", JSON.stringify(entries));
  if (window.firebaseReady) {
    await window.fbSet("data", {entries, dogName});
    setSyncStatus("✓ Synchro "+new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}));
  }
  render();
}

async function saveNotes(list, d) {
  notes = list;
  localStorage.setItem(noteKey(d), JSON.stringify(list));
  if (window.firebaseReady) await window.fbSet(noteKey(d), list);
  renderNotes();
}

function addEntry(type, extra={}) {
  const e = {id:Date.now(), type, ts:Date.now(), ...extra};
  entries = [e, ...entries];
  saveEntries();
  showToast(TYPES[type].icon+" "+TYPES[type].label+" enregistré !");
  viewOffset = 0; renderDayNav();
}
function deleteEntry(id) { entries=entries.filter(e=>e.id!==id); saveEntries(); }
function updateEntry(id, fields) {
  entries=entries.map(e=>e.id===id?{...e,...fields}:e);
  saveEntries(); showToast("✏️ Modifié !");
}
function deleteDay() {
  const vd=getViewDate();
  if(isToday(vd)) return;
  if(!confirm(`Supprimer "${dayLabel(vd)}" ?`)) return;
  entries=entries.filter(e=>new Date(e.ts).toDateString()!==vd.toDateString());
  saveEntries();
}

function switchTab(t) {
  currentTab=t;
  document.getElementById("journalTab").style.display=t==="journal"?"block":"none";
  document.getElementById("notesTab").style.display=t==="notes"?"block":"none";
  document.getElementById("tabJournal").className="tab"+(t==="journal"?" active":"");
  document.getElementById("tabNotes").className="tab"+(t==="notes"?" active":"");
  if(t==="notes") listenNotes(getViewDate());
  renderDayNav();
}

function changeDay(d) {
  if(viewOffset+d>0) return;
  viewOffset+=d;
  renderDayNav();
  if(currentTab==="journal") render();
  else { notes=[]; renderNotes(); listenNotes(getViewDate()); }
}

function renderDayNav() {
  const vd=getViewDate(), lbl=dayLabel(vd), sub=daySub(vd);
  const jl=document.getElementById("dayLabel");
  if(jl) jl.innerHTML=lbl+(sub?`<span class="day-nav-sub">${sub}</span>`:"");
  const bn=document.getElementById("btnNext"); if(bn) bn.disabled=viewOffset>=0;
  const bd=document.getElementById("btnDelDay"); if(bd) bd.style.visibility=viewOffset<0?"visible":"hidden";
  const nl=document.getElementById("noteDayLabel"); if(nl) nl.textContent=lbl;
  const nbn=document.getElementById("notesBtnNext"); if(nbn) nbn.disabled=viewOffset>=0;
}

function adj(id,d) { const el=document.getElementById(id); el.value=Math.max(0,(parseInt(el.value)||0)+d); }
function selUnit(btn,type) {
  const row=type==="food"?"unitRow1":"unitRow2";
  document.querySelectorAll("#"+row+" .chip").forEach(c=>c.style.cssText="");
  btn.style.background=type==="food"?"#E8735A":"#6BBF6B";
  btn.style.borderColor=type==="food"?"#E8735A":"#6BBF6B";
  btn.style.color="white";
  if(type==="food") foodUnit=btn.dataset.u; else foodUnitJeu=btn.dataset.u;
}
function setActiveChip(rowId,val,color) {
  document.querySelectorAll("#"+rowId+" .chip").forEach(c=>{
    if(c.dataset.u===val){c.style.background=color;c.style.borderColor=color;c.style.color="white";}
    else{c.style.background="white";c.style.borderColor="#e0cbb0";c.style.color="#8B5E3C";}
  });
}
function openFoodModal(entry) {
  editingId=entry?entry.id:null;
  document.getElementById("foodModalTitle").textContent=entry?"✏️ Modifier le repas":"🍖 Repas";
  document.getElementById("foodConfirmBtn").textContent=entry?"✓ Mettre à jour":"✓ Enregistrer";
  document.getElementById("foodQty").value=entry?.qty??100;
  document.getElementById("foodQtyJeu").value=entry?.qtyJeu??0;
  document.getElementById("foodTime").value=entry?.ts?toTimeVal(entry.ts):toTimeVal(Date.now());
  foodUnit=entry?.unit??"g"; foodUnitJeu=entry?.unitJeu??"g";
  setActiveChip("unitRow1",foodUnit,"#E8735A");
  setActiveChip("unitRow2",foodUnitJeu,"#6BBF6B");
  document.getElementById("foodModal").classList.add("open");
}
function closeFoodModal(){document.getElementById("foodModal").classList.remove("open");}
function confirmFood() {
  const qty=parseInt(document.getElementById("foodQty").value)||0;
  const qtyJeu=parseInt(document.getElementById("foodQtyJeu").value)||0;
  const timeStr=document.getElementById("foodTime").value;
  closeFoodModal();
  if(editingId) {
    const orig=entries.find(e=>e.id===editingId);
    const ts=timeStr?applyTime(orig.ts,timeStr):orig.ts;
    updateEntry(editingId,{qty,unit:foodUnit,ts,qtyJeu:qtyJeu>0?qtyJeu:undefined,unitJeu:qtyJeu>0?foodUnitJeu:undefined});
  } else {
    const ts=timeStr?applyTime(Date.now(),timeStr):Date.now();
    addEntry("manger",{qty,unit:foodUnit,ts,...(qtyJeu>0?{qtyJeu,unitJeu:foodUnitJeu}:{})});
  }
}
function openTimeModal(entry) {
  timeEditId=entry.id;
  document.getElementById("timeModalTitle").textContent=TYPES[entry.type].icon+" Modifier l'heure";
  document.getElementById("timeInput").value=toTimeVal(entry.ts);
  document.getElementById("timeModal").classList.add("open");
}
function closeTimeModal(){document.getElementById("timeModal").classList.remove("open");}
function confirmTime() {
  const str=document.getElementById("timeInput").value;
  const orig=entries.find(e=>e.id===timeEditId);
  if(orig&&str) updateEntry(timeEditId,{ts:applyTime(orig.ts,str)});
  closeTimeModal();
}

function addNote() {
  const el=document.getElementById("noteInput");
  const text=el.value.trim(); if(!text) return;
  el.value="";
  const d=getViewDate();
  saveNotes([...notes,{id:Date.now(),text,ts:Date.now()}],d);
}
function deleteNote(id) {
  saveNotes(notes.filter(n=>n.id!==id),getViewDate());
}

function render() {
  document.getElementById("dogNameInput").value=dogName;
  const vd=getViewDate();
  const day=entries.filter(e=>new Date(e.ts).toDateString()===vd.toDateString());
  document.getElementById("cPipi").textContent=day.filter(e=>e.type==="pipi").length;
  document.getElementById("cCaca").textContent=day.filter(e=>e.type==="caca").length;
  document.getElementById("cManger").textContent=day.filter(e=>e.type==="manger").length;
  document.getElementById("logCount").textContent=day.length>0?`(${day.length})`:"";
  renderDayNav();
  const sorted=[...day].sort((a,b)=>b.ts-a.ts);
  const list=document.getElementById("logList");
  if(sorted.length===0){list.innerHTML='<div class="empty"><span class="paw">🐾</span>Aucun événement ce jour-là.</div>';return;}
  list.innerHTML=sorted.map(e=>{
    const t=TYPES[e.type];
    const qty=e.type==="manger"&&e.qty!==undefined?`<span class="log-qty">${e.qty} ${e.unit}${e.qtyJeu?` · 🎾 ${e.qtyJeu} ${e.unitJeu}`:""}</span>`:"";
    const ago=isToday(vd)?` · <span class="log-ago">${timeAgo(e.ts)}</span>`:"";
    const editBtn=e.type==="manger"
      ?`<button class="btn-icon" style="color:#93C5FD" onclick='openFoodModal(${JSON.stringify(e)})'>✏️</button>`
      :`<button class="btn-icon" style="color:#93C5FD" onclick='openTimeModal(${JSON.stringify(e)})'>🕐</button>`;
    return `<div class="log-item"><div class="log-icon" style="background:${t.bg}">${t.icon}</div><div class="log-info"><div class="log-type">${t.label}${qty}</div><div class="log-time">${fmtTime(e.ts)}${ago}</div></div>${editBtn}<button class="btn-icon" style="color:#d4b09a" onclick="deleteEntry(${e.id})">✕</button></div>`;
  }).join("");
}

function renderNotes() {
  const list=document.getElementById("noteList");
  if(notes.length===0){list.innerHTML='<div class="empty"><span class="paw">📝</span>Aucune note ce jour-là.</div>';return;}
  list.innerHTML=notes.map(n=>`<div class="note-card"><div style="flex:1"><div class="note-text">${n.text.replace(/</g,"&lt;")}</div><div class="note-time">${fmtTime(n.ts)}</div></div><button class="btn-icon" style="color:#d4b09a" onclick="deleteNote(${n.id})">✕</button></div>`).join("");
}

let toastT;
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),2000);
}

renderDayNav(); render(); renderNotes();
</script>

</body>
</html>
